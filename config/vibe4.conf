# --- BLE / pairing reliability ---
CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y
# Allow re-pairing without manually clearing bonds first (helps macOS).
CONFIG_BT_SETTINGS=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_ZMK_BLE_EXPERIMENTAL_SEC=y

# Identify cleanly to macOS as a keyboard.
CONFIG_ZMK_KEYBOARD_NAME="Vibe4"

# Battery reporting over BLE (so macOS shows %).
CONFIG_ZMK_BATTERY_REPORTING=y

# Sleep / power
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
