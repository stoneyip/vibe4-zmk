# --- BLE / pairing ---
CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y
CONFIG_ZMK_KEYBOARD_NAME="Vibe4"

# Force "Just Works" pairing — a 4-key macropad cannot enter a 6-digit PIN.
CONFIG_ZMK_BLE_PASSKEY_ENTRY=n

# Allow the device to overwrite a previous bond if the central re-pairs.
# This is what unsticks Macs / phones that still hold an old LTK.
CONFIG_BT_SETTINGS=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_ZMK_BLE_EXPERIMENTAL_SEC=y

# Battery % over BLE
CONFIG_ZMK_BATTERY_REPORTING=y

# Sleep / power
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
