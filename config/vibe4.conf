# --- BLE / pairing ---
CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y
CONFIG_ZMK_KEYBOARD_NAME="Vibe4"

# Force "Just Works" pairing (no 6-digit passkey prompt on macOS).
# The default in newer ZMK enables passkey entry, which a 4-key macropad cannot satisfy.
CONFIG_ZMK_BLE_PASSKEY_ENTRY=n

# Persist bonds in flash (more reliable re-pairing).
CONFIG_BT_SETTINGS=y

# Battery % over BLE
CONFIG_ZMK_BATTERY_REPORTING=y

# Sleep / power
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
